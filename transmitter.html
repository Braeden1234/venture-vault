<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Transmitter</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#111;font-family:Arial,sans-serif;color:white;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    }
    .box{
      max-width:480px;width:100%;
      background:rgba(191,144,0,0.1);
      border:2px solid rgba(191,144,0,0.4);
      border-radius:14px;padding:28px;
    }
    h1{color:#ffd700;margin-bottom:6px;text-align:center;font-size:1.5em}
    .subtitle{text-align:center;color:rgba(255,255,255,0.35);font-size:0.8em;margin-bottom:22px;letter-spacing:1px}

    .btn{
      display:block;width:100%;padding:15px;border:none;border-radius:9px;
      font-size:1em;font-weight:bold;cursor:pointer;margin-bottom:10px;color:white;
      transition:opacity .2s,transform .15s;
    }
    .btn:active{transform:scale(0.97)}
    .btn:disabled{opacity:0.28;cursor:not-allowed;transform:none!important}
    .green{background:linear-gradient(135deg,#4caf50,#388e3c)}
    .red  {background:linear-gradient(135deg,#f44336,#c62828)}
    .blue {background:linear-gradient(135deg,#2196f3,#1565c0)}
    .amber{background:linear-gradient(135deg,#ff9800,#e65100)}

    video{
      width:100%;border-radius:9px;background:#000;display:none;
      margin-bottom:10px;max-height:200px;object-fit:contain;
      border:1px solid rgba(191,144,0,0.3);
    }

    #status{
      text-align:center;padding:12px;border-radius:8px;
      background:rgba(0,0,0,0.4);color:#aaa;font-size:0.86em;margin-bottom:8px;
      line-height:1.4;
    }
    #rxcount{
      text-align:center;padding:8px;border-radius:8px;
      background:rgba(33,150,243,0.1);border:1px solid rgba(33,150,243,0.25);
      color:#64b5f6;font-size:0.82em;margin-bottom:8px;display:none;
    }
    #log{
      text-align:center;color:rgba(255,255,255,0.18);
      font-family:monospace;font-size:0.68em;min-height:14px;
    }

    /* iOS notice banner */
    #iosBanner{
      background:rgba(255,152,0,0.12);border:1px solid rgba(255,152,0,0.35);
      border-radius:8px;padding:10px 14px;margin-bottom:14px;
      font-size:0.8em;color:#ffb74d;line-height:1.5;display:none;
    }

    /* Camera flip button — only shown on iOS */
    #flipBtn{display:none}
  </style>
</head>
<body>
<div class="box">
  <h1>📡 Transmitter</h1>
  <div class="subtitle" id="modeLabel">SCREEN SHARE</div>

  <div id="iosBanner">
    ⚠️ iOS does not support screen capture in browsers.<br>
    Using <strong>camera</strong> instead — point your phone at whatever you want to share.
  </div>

  <video id="preview" muted autoplay playsinline></video>

  <button class="btn green" id="startBtn"  onclick="startShare()">📺 Start Sharing</button>
  <button class="btn blue"  id="switchBtn" onclick="switchSource()" disabled>🔄 Switch Tab / Window</button>
  <button class="btn amber" id="flipBtn"   onclick="flipCamera()">🔃 Flip Camera</button>
  <button class="btn red"   id="stopBtn"   onclick="stopShare()"   disabled>⏹ Stop</button>

  <div id="status">Ready</div>
  <div id="rxcount"></div>
  <div id="log"></div>
</div>
<script>
// ── HARDCODED ────────────────────────────────────────────────────────────────
const FORM  = "https://docs.google.com/forms/u/0/d/e/1FAIpQLScjcxNzt7-UPVnMoByGLaFhZoAQuM7XBEZmNJgcP0K72sltEw/formResponse";
const SHEET = "https://docs.google.com/spreadsheets/d/1FaeVsI8nxNeXdzkMuMtN4alFas6pCerFjA7L9hvbaOM/gviz/tq?tqx=out:csv&gid=0";
const F_SES  = "entry.1210189098";
const F_TYPE = "entry.2124791945";
const F_DATA = "entry.1906917004";
const STUN = {iceServers:[
  {urls:"stun:stun.l.google.com:19302"},
  {urls:"stun:stun1.l.google.com:19302"},
  {urls:"stun:stun2.l.google.com:19302"},
  {urls:"stun:stun3.l.google.com:19302"}
]};
// ────────────────────────────────────────────────────────────────────────────

const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
              (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const canScreen = !isIOS && !!navigator.mediaDevices.getDisplayMedia;

let stream      = null;
let peers       = {};
let pollLoop    = null;
let facingMode  = 'environment'; // back camera default on iOS

// ── Setup UI based on platform ───────────────────────────────────────────────
if(isIOS) {
  document.getElementById('iosBanner').style.display = 'block';
  document.getElementById('modeLabel').textContent   = 'CAMERA MODE (iOS)';
  document.getElementById('switchBtn').style.display = 'none';
  document.getElementById('flipBtn').style.display   = 'block';
} else {
  document.getElementById('modeLabel').textContent = 'SCREEN SHARE';
}

// ── Start ────────────────────────────────────────────────────────────────────
async function startShare() {
  const s = await getSource();
  if(!s) return;
  stream = s;

  const prev = document.getElementById('preview');
  prev.srcObject = stream;
  prev.style.display = 'block';

  if(!isIOS) stream.getVideoTracks()[0].onended = stopShare;

  document.getElementById('startBtn').disabled  = true;
  document.getElementById('stopBtn').disabled   = false;
  if(canScreen) document.getElementById('switchBtn').disabled = false;

  document.getElementById('rxcount').style.display = 'block';
  pollLoop = setInterval(poll, 2000);
  poll();
}

// ── Get capture source ───────────────────────────────────────────────────────
async function getSource() {
  try {
    if(canScreen) {
      // Desktop: screen capture
      return await navigator.mediaDevices.getDisplayMedia({
        video: { cursor: 'always', frameRate: 30 },
        audio: false
      });
    } else {
      // iOS: camera
      return await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode,
          width:  { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30 }
        },
        audio: false
      });
    }
  } catch(e) { st('❌ ' + e.message); return null; }
}

// ── Switch tab/window (desktop only) ─────────────────────────────────────────
async function switchSource() {
  const newStream = await getSource();
  if(!newStream) return;
  const newTrack = newStream.getVideoTracks()[0];

  for(const rxid in peers) {
    const sender = peers[rxid].pc.getSenders().find(s => s.track?.kind === 'video');
    if(sender) sender.replaceTrack(newTrack).catch(e => log('replace: '+e.message));
  }

  if(stream) stream.getTracks().forEach(t => t.stop());
  stream = newStream;
  document.getElementById('preview').srcObject = stream;
  stream.getVideoTracks()[0].onended = stopShare;
  st('🔄 Source switched');
}

// ── Flip camera (iOS only) ───────────────────────────────────────────────────
async function flipCamera() {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  if(stream) stream.getTracks().forEach(t => t.stop());

  try {
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width:{ideal:1280}, height:{ideal:720}, frameRate:{ideal:30} },
      audio: false
    });
    const newTrack = newStream.getVideoTracks()[0];

    for(const rxid in peers) {
      const sender = peers[rxid].pc.getSenders().find(s => s.track?.kind === 'video');
      if(sender) sender.replaceTrack(newTrack).catch(e => log('flip: '+e.message));
    }

    stream = newStream;
    document.getElementById('preview').srcObject = stream;
    st('🔃 Camera flipped');
  } catch(e) { st('❌ Flip failed: ' + e.message); }
}

// ── Stop ─────────────────────────────────────────────────────────────────────
function stopShare() {
  clearInterval(pollLoop);
  Object.values(peers).forEach(p => p.pc?.close());
  peers = {};
  if(stream) stream.getTracks().forEach(t => t.stop());
  stream = null;
  const prev = document.getElementById('preview');
  prev.srcObject = null; prev.style.display = 'none';
  document.getElementById('startBtn').disabled  = false;
  document.getElementById('switchBtn').disabled = true;
  document.getElementById('stopBtn').disabled   = true;
  document.getElementById('rxcount').style.display = 'none';
  st('Stopped'); log('');
}

// ── Poll: discover receivers + apply answers ──────────────────────────────────
async function poll() {
  if(!stream) return;
  try {
    const rows = await getSheet();

    // Find all join requests
    const requests = new Set();
    for(const r of rows) {
      if(r.length >= 2 && r[0].startsWith('RX_') && r[1] === 'join') requests.add(r[0]);
    }

    // New receivers → create dedicated PC + offer
    for(const rxid of requests) {
      if(peers[rxid]) continue;
      peers[rxid] = { pc: null, offerSent: false, answerApplied: false };
      log('new rx: ' + rxid);
      await createOfferFor(rxid);
    }

    // Check for answers
    for(const rxid in peers) {
      const p = peers[rxid];
      if(!p.offerSent || p.answerApplied || p.pc?.remoteDescription) continue;
      const ansKey = rxid + '_ANS';
      for(let i = rows.length-1; i >= 0; i--) {
        const r = rows[i];
        if(r.length < 3 || r[0] !== ansKey || r[1] !== 'answer') continue;
        try {
          await p.pc.setRemoteDescription(new RTCSessionDescription(dec(r[2])));
          p.answerApplied = true;
          log('ans OK: ' + rxid);
        } catch(e) { log('ans err: '+e.message); }
        break;
      }
    }

    // Prune dead connections
    for(const rxid in peers) {
      const s = peers[rxid].pc?.connectionState;
      if(['failed','closed'].includes(s)) { peers[rxid].pc?.close(); delete peers[rxid]; }
    }

    // Update count
    const alive = Object.values(peers).filter(p => p.pc?.connectionState === 'connected').length;
    const total = Object.keys(peers).length;
    document.getElementById('rxcount').textContent =
      `📺 ${alive} receiver${alive!==1?'s':''} connected (${total} total)`;

  } catch(e) { log('poll: '+e.message); }
}

async function createOfferFor(rxid) {
  const pc = new RTCPeerConnection(STUN);
  peers[rxid].pc = pc;
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  pc.onconnectionstatechange = () => {
    log(rxid + ': ' + pc.connectionState);
    if(pc.connectionState === 'connected') st('🟢 ' + rxid + ' live');
    if(['disconnected','failed'].includes(pc.connectionState)) delete peers[rxid];
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitICE(pc);
  await post(rxid + '_OFFER', 'offer', enc(pc.localDescription));
  peers[rxid].offerSent = true;
  log('offer → ' + rxid);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function waitICE(pc) {
  return new Promise(r => {
    if(pc.iceGatheringState==='complete'){r();return;}
    pc.onicegatheringstatechange = () => { if(pc.iceGatheringState==='complete') r(); };
    setTimeout(r, 10000);
  });
}
async function post(s,t,d) {
  const fd=new FormData();
  fd.append(F_SES,s); fd.append(F_TYPE,t); fd.append(F_DATA,d);
  await fetch(FORM,{method:'POST',body:fd,mode:'no-cors'});
  await sleep(500);
}
async function getSheet() {
  const r=await fetch(SHEET+'&t='+Date.now(),{cache:'no-store'});
  return csv(await r.text());
}
function csv(t) {
  const rows=[];
  for(const line of t.trim().split('\n')) {
    if(!line.trim()) continue;
    const f=[];let c='',q=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(q&&line[i+1]==='"'){c+='"';i++;}else q=!q;}
      else if(ch===','&&!q){f.push(c.trim());c='';}
      else c+=ch;
    }
    f.push(c.trim());rows.push(f);
  }
  return rows;
}
function enc(sdp){return btoa(unescape(encodeURIComponent(JSON.stringify(sdp))));}
function dec(s){return JSON.parse(decodeURIComponent(escape(atob(s))));}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function st(m){document.getElementById('status').textContent=m;}
function log(m){document.getElementById('log').textContent=m;}
</script>
</body>
</html>
